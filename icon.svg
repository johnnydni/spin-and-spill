<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0a0a0f"/>
  <!-- Wheel segments -->
  <g transform="translate(256,256)">
    <!-- seg 0 teal -->
    <path d="M0,0 L0,-180 A180,180 0 0,1 155.88,-90 Z" fill="#1d3a3a" stroke="#4ecdc4" stroke-width="3"/>
    <!-- seg 1 gold -->
    <path d="M0,0 L155.88,-90 A180,180 0 0,1 155.88,90 Z" fill="#2a1f0f" stroke="#c8a97e" stroke-width="3"/>
    <!-- seg 2 pink -->
    <path d="M0,0 L155.88,90 A180,180 0 0,1 0,180 Z" fill="#2a1020" stroke="#ff6b9d" stroke-width="3"/>
    <!-- seg 3 teal -->
    <path d="M0,0 L0,180 A180,180 0 0,1 -155.88,90 Z" fill="#1a3535" stroke="#4ecdc4" stroke-width="3"/>
    <!-- seg 4 gold -->
    <path d="M0,0 L-155.88,90 A180,180 0 0,1 -155.88,-90 Z" fill="#251c0d" stroke="#c8a97e" stroke-width="3"/>
    <!-- seg 5 pink -->
    <path d="M0,0 L-155.88,-90 A180,180 0 0,1 0,-180 Z" fill="#25101d" stroke="#ff6b9d" stroke-width="3"/>
    <!-- center -->
    <circle r="48" fill="#0a0a0f" stroke="#c8a97e" stroke-width="3"/>
    <circle r="16" fill="#c8a97e"/>
  </g>
  <!-- pointer -->
  <polygon points="256,52 244,78 268,78" fill="#c8a97e"/>
</svg>
